<svg viewBox="0 0 900 510" xmlns="http://www.w3.org/2000/svg" font-family="Inter, Roboto, Open Sans, system-ui, sans-serif">
  <!-- Fondo -->
  <rect width="900" height="510" fill="#1a1a2e"/>

  <!-- Título -->
  <text x="450" y="38" text-anchor="middle" fill="#F0DB4F" font-size="20" font-weight="bold">Spread Operator con Arrays  ···</text>
  <text x="450" y="58" text-anchor="middle" fill="#9e9e9e" font-size="13">Copiar · Fusionar · Agregar · Expandir</text>

  <!-- ═══ PANEL: Problema de referencia ═══ -->
  <rect x="30" y="75" width="410" height="130" rx="8" fill="#16213e" stroke="#e57373" stroke-width="1.5"/>
  <text x="235" y="96" text-anchor="middle" fill="#e57373" font-size="13" font-weight="bold">❌ Sin spread: copia por referencia</text>

  <rect x="45" y="105" width="380" height="20" rx="3" fill="#0d1b2a"/>
  <text x="53" y="119" fill="#9e9e9e" font-size="11">const original = [1, 2, 3];</text>

  <rect x="45" y="129" width="380" height="20" rx="3" fill="#0d1b2a"/>
  <text x="53" y="143" fill="#e57373" font-size="11">const bad = original;    <tspan fill="#9e9e9e">// ← NO es una copia real</tspan></text>

  <rect x="45" y="153" width="380" height="20" rx="3" fill="#0d1b2a"/>
  <text x="53" y="167" fill="#e0e0e0" font-size="11">bad.push(4);</text>

  <text x="235" y="193" text-anchor="middle" fill="#e57373" font-size="11">original = [1,2,3,4]  ← ¡el original cambió!</text>

  <!-- ═══ PANEL: Copiar con spread ═══ -->
  <rect x="460" y="75" width="410" height="130" rx="8" fill="#16213e" stroke="#81c784" stroke-width="1.5"/>
  <text x="665" y="96" text-anchor="middle" fill="#81c784" font-size="13" font-weight="bold">✅ Con spread: copia independiente</text>

  <rect x="475" y="105" width="380" height="20" rx="3" fill="#0d1b2a"/>
  <text x="483" y="119" fill="#9e9e9e" font-size="11">const original = [1, 2, 3];</text>

  <rect x="475" y="129" width="380" height="20" rx="3" fill="#0d1b2a"/>
  <text x="483" y="143" fill="#81c784" font-size="11">const copy = [...original];  <tspan fill="#9e9e9e">// ← copia real</tspan></text>

  <rect x="475" y="153" width="380" height="20" rx="3" fill="#0d1b2a"/>
  <text x="483" y="167" fill="#e0e0e0" font-size="11">copy.push(4);</text>

  <text x="665" y="193" text-anchor="middle" fill="#81c784" font-size="11">original = [1,2,3]  ✓  copy = [1,2,3,4]  ✓</text>

  <!-- ═══ PANEL: Fusionar ═══ -->
  <rect x="30" y="220" width="265" height="130" rx="8" fill="#16213e" stroke="#4fc3f7" stroke-width="1.5"/>
  <text x="162" y="241" text-anchor="middle" fill="#4fc3f7" font-size="13" font-weight="bold">Fusionar Arrays</text>

  <rect x="45" y="250" width="235" height="20" rx="3" fill="#0d1b2a"/>
  <text x="53" y="264" fill="#9e9e9e" font-size="11">const a = [1, 2, 3];</text>

  <rect x="45" y="274" width="235" height="20" rx="3" fill="#0d1b2a"/>
  <text x="53" y="288" fill="#9e9e9e" font-size="11">const b = [4, 5, 6];</text>

  <rect x="45" y="298" width="235" height="20" rx="3" fill="#0d1b2a"/>
  <text x="53" y="312" fill="#4fc3f7" font-size="11">const c = [...a, ...b];</text>

  <text x="162" y="338" text-anchor="middle" fill="#81c784" font-size="11">c = [1,2,3,4,5,6]</text>

  <!-- ═══ PANEL: Agregar elementos ═══ -->
  <rect x="315" y="220" width="265" height="130" rx="8" fill="#16213e" stroke="#ce93d8" stroke-width="1.5"/>
  <text x="447" y="241" text-anchor="middle" fill="#ce93d8" font-size="13" font-weight="bold">Agregar Sin Mutar</text>

  <rect x="330" y="250" width="235" height="20" rx="3" fill="#0d1b2a"/>
  <text x="338" y="264" fill="#9e9e9e" font-size="11">const base = ["a", "b", "c"];</text>

  <rect x="330" y="274" width="235" height="20" rx="3" fill="#0d1b2a"/>
  <text x="338" y="288" fill="#ce93d8" font-size="11">const end = [...base, "d"];</text>

  <rect x="330" y="298" width="235" height="20" rx="3" fill="#0d1b2a"/>
  <text x="338" y="312" fill="#ce93d8" font-size="11">const start = ["z", ...base];</text>

  <text x="447" y="338" text-anchor="middle" fill="#81c784" font-size="11">base sin cambios ✓</text>

  <!-- ═══ PANEL: Como argumentos ═══ -->
  <rect x="600" y="220" width="270" height="130" rx="8" fill="#16213e" stroke="#ffd54f" stroke-width="1.5"/>
  <text x="735" y="241" text-anchor="middle" fill="#ffd54f" font-size="13" font-weight="bold">Como Argumentos</text>

  <rect x="615" y="250" width="240" height="20" rx="3" fill="#0d1b2a"/>
  <text x="623" y="264" fill="#9e9e9e" font-size="11">const nums = [3, 1, 4, 1, 5, 9];</text>

  <rect x="615" y="274" width="240" height="20" rx="3" fill="#0d1b2a"/>
  <text x="623" y="288" fill="#ffd54f" font-size="11">Math.max(...nums)  → 9</text>

  <rect x="615" y="298" width="240" height="20" rx="3" fill="#0d1b2a"/>
  <text x="623" y="312" fill="#ffd54f" font-size="11">Math.min(...nums)  → 1</text>

  <text x="735" y="338" text-anchor="middle" fill="#9e9e9e" font-size="11" font-style="italic">Expande array = args individuales</text>

  <!-- ═══ Spread vs Rest ═══ -->
  <rect x="30" y="365" width="840" height="125" rx="8" fill="#16213e" stroke="#F0DB4F" stroke-width="1"/>
  <text x="450" y="387" text-anchor="middle" fill="#F0DB4F" font-size="12" font-weight="bold">Spread vs Rest — Mismo operador ... distintos roles</text>

  <!-- Spread -->
  <rect x="45" y="397" width="395" height="80" rx="6" fill="#0d1b2a"/>
  <text x="242" y="415" text-anchor="middle" fill="#81c784" font-size="12" font-weight="bold">SPREAD — Expande</text>
  <text x="53" y="433" fill="#9e9e9e" font-size="11">const arr = [1, 2, 3];</text>
  <text x="53" y="449" fill="#81c784" font-size="11">fn(...arr)              ← expande al llamar</text>
  <text x="53" y="465" fill="#81c784" font-size="11">const copy = [...arr]  ← expande en literal []</text>

  <!-- Rest -->
  <rect x="460" y="397" width="395" height="80" rx="6" fill="#0d1b2a"/>
  <text x="657" y="415" text-anchor="middle" fill="#ce93d8" font-size="12" font-weight="bold">REST — Agrupa</text>
  <text x="468" y="433" fill="#9e9e9e" font-size="11">// En la firma de la función:</text>
  <text x="468" y="449" fill="#ce93d8" font-size="11">const sum = (...nums) =&gt; { ... }</text>
  <text x="468" y="465" fill="#ce93d8" font-size="11">sum(1,2,3)  → nums = [1,2,3]  ← agrupa</text>
</svg>
