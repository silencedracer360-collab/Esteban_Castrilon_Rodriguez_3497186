<svg viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg" font-family="Inter, Roboto, Open Sans, system-ui, sans-serif">
  <!-- Fondo -->
  <rect width="900" height="520" fill="#1a1a2e"/>

  <!-- Título -->
  <text x="450" y="38" text-anchor="middle" fill="#F0DB4F" font-size="20" font-weight="bold">Arrays: Crear y Acceder</text>
  <text x="450" y="58" text-anchor="middle" fill="#9e9e9e" font-size="13">Semana 08 · JavaScript ES2023</text>

  <!-- ═══ PANEL 1: Anatomía del array ═══ -->
  <rect x="30" y="75" width="415" height="185" rx="8" fill="#16213e" stroke="#F0DB4F" stroke-width="1.5"/>
  <text x="237" y="97" text-anchor="middle" fill="#F0DB4F" font-size="13" font-weight="bold">Anatomía de un Array</text>

  <!-- Celdas del array -->
  <rect x="55"  y="110" width="60" height="48" rx="4" fill="#0d1b2a" stroke="#4fc3f7" stroke-width="1.5"/>
  <rect x="123" y="110" width="60" height="48" rx="4" fill="#0d1b2a" stroke="#4fc3f7" stroke-width="1.5"/>
  <rect x="191" y="110" width="60" height="48" rx="4" fill="#0d1b2a" stroke="#4fc3f7" stroke-width="1.5"/>
  <rect x="259" y="110" width="60" height="48" rx="4" fill="#0d1b2a" stroke="#4fc3f7" stroke-width="1.5"/>
  <rect x="327" y="110" width="60" height="48" rx="4" fill="#0d1b2a" stroke="#4fc3f7" stroke-width="1.5"/>

  <!-- Valores -->
  <text x="85"  y="130" text-anchor="middle" fill="#81c784" font-size="12" font-weight="bold">"sol"</text>
  <text x="153" y="130" text-anchor="middle" fill="#81c784" font-size="12" font-weight="bold">"luna"</text>
  <text x="221" y="130" text-anchor="middle" fill="#81c784" font-size="12" font-weight="bold">"mar"</text>
  <text x="289" y="130" text-anchor="middle" fill="#81c784" font-size="12" font-weight="bold">"rio"</text>
  <text x="357" y="130" text-anchor="middle" fill="#81c784" font-size="12" font-weight="bold">"viento"</text>

  <!-- Índices positivos -->
  <text x="85"  y="148" text-anchor="middle" fill="#ce93d8" font-size="11">[0]</text>
  <text x="153" y="148" text-anchor="middle" fill="#ce93d8" font-size="11">[1]</text>
  <text x="221" y="148" text-anchor="middle" fill="#ce93d8" font-size="11">[2]</text>
  <text x="289" y="148" text-anchor="middle" fill="#ce93d8" font-size="11">[3]</text>
  <text x="357" y="148" text-anchor="middle" fill="#ce93d8" font-size="11">[4]</text>

  <!-- Etiquetas positivo/negativo -->
  <text x="237" y="175" text-anchor="middle" fill="#9e9e9e" font-size="11">índices positivos →</text>

  <!-- Índices negativos -->
  <text x="85"  y="197" text-anchor="middle" fill="#ffd54f" font-size="11">[-5]</text>
  <text x="153" y="197" text-anchor="middle" fill="#ffd54f" font-size="11">[-4]</text>
  <text x="221" y="197" text-anchor="middle" fill="#ffd54f" font-size="11">[-3]</text>
  <text x="289" y="197" text-anchor="middle" fill="#ffd54f" font-size="11">[-2]</text>
  <text x="357" y="197" text-anchor="middle" fill="#ffd54f" font-size="11">[-1]</text>

  <text x="237" y="218" text-anchor="middle" fill="#ffd54f" font-size="11" font-style="italic">← índices negativos (ES2022 .at())</text>
  <text x="237" y="249" text-anchor="middle" fill="#e0e0e0" font-size="12">length = 5</text>

  <!-- ═══ PANEL 2: Acceso por índice ═══ -->
  <rect x="455" y="75" width="415" height="185" rx="8" fill="#16213e" stroke="#81c784" stroke-width="1.5"/>
  <text x="662" y="97" text-anchor="middle" fill="#81c784" font-size="13" font-weight="bold">Acceso por Índice</text>

  <!-- Líneas de código -->
  <rect x="470" y="108" width="385" height="22" rx="3" fill="#0d1b2a"/>
  <text x="478" y="123" fill="#9e9e9e" font-size="12">const words = ["sol", "luna", "mar", "rio", "viento"];</text>

  <rect x="470" y="134" width="385" height="22" rx="3" fill="#0d1b2a"/>
  <text x="478" y="149" fill="#e0e0e0" font-size="12">words<tspan fill="#ce93d8">[0]</tspan>       →  <tspan fill="#81c784">"sol"</tspan>    (primero)</text>

  <rect x="470" y="160" width="385" height="22" rx="3" fill="#0d1b2a"/>
  <text x="478" y="175" fill="#e0e0e0" font-size="12">words<tspan fill="#ce93d8">[2]</tspan>       →  <tspan fill="#81c784">"mar"</tspan>   (tercero)</text>

  <rect x="470" y="186" width="385" height="22" rx="3" fill="#0d1b2a"/>
  <text x="478" y="201" fill="#e0e0e0" font-size="12">words<tspan fill="#4fc3f7">.at(-1)</tspan>   →  <tspan fill="#ffd54f">"viento"</tspan> (último)</text>

  <rect x="470" y="212" width="385" height="22" rx="3" fill="#0d1b2a"/>
  <text x="478" y="227" fill="#e0e0e0" font-size="12">words<tspan fill="#4fc3f7">.at(-2)</tspan>   →  <tspan fill="#ffd54f">"rio"</tspan>   (penúltimo)</text>

  <rect x="470" y="238" width="385" height="22" rx="3" fill="#0d1b2a"/>
  <text x="478" y="253" fill="#e0e0e0" font-size="12">words<tspan fill="#ce93d8">[10]</tspan>      →  <tspan fill="#e57373">undefined</tspan>   (fuera de rango)</text>

  <!-- ═══ PANEL 3: .length ═══ -->
  <rect x="30" y="275" width="200" height="135" rx="8" fill="#16213e" stroke="#ce93d8" stroke-width="1.5"/>
  <text x="130" y="296" text-anchor="middle" fill="#ce93d8" font-size="13" font-weight="bold">.length</text>

  <text x="50" y="320" fill="#9e9e9e" font-size="12">Total de elementos</text>

  <rect x="46" y="330" width="170" height="22" rx="3" fill="#0d1b2a"/>
  <text x="54" y="345" fill="#e0e0e0" font-size="12">words.<tspan fill="#ce93d8">length</tspan>   →  <tspan fill="#F0DB4F">5</tspan></text>

  <rect x="46" y="356" width="170" height="22" rx="3" fill="#0d1b2a"/>
  <text x="54" y="371" fill="#e0e0e0" font-size="12">[ ].<tspan fill="#ce93d8">length</tspan>    →  <tspan fill="#e57373">0</tspan></text>

  <text x="130" y="402" text-anchor="middle" fill="#9e9e9e" font-size="11" font-style="italic">Propiedad, no método</text>

  <!-- ═══ PANEL 4: .at() — ES2022 ═══ -->
  <rect x="245" y="275" width="200" height="135" rx="8" fill="#16213e" stroke="#ffd54f" stroke-width="1.5"/>
  <text x="345" y="296" text-anchor="middle" fill="#ffd54f" font-size="13" font-weight="bold">.at() — ES2022</text>

  <rect x="260" y="308" width="170" height="22" rx="3" fill="#0d1b2a"/>
  <text x="268" y="323" fill="#e0e0e0" font-size="12">.at(0)    →  primero</text>

  <rect x="260" y="334" width="170" height="22" rx="3" fill="#0d1b2a"/>
  <text x="268" y="349" fill="#e0e0e0" font-size="12">.at(-1)   →  último</text>

  <rect x="260" y="360" width="170" height="22" rx="3" fill="#0d1b2a"/>
  <text x="268" y="375" fill="#e0e0e0" font-size="12">.at(-2)   →  penúltimo</text>

  <text x="345" y="402" text-anchor="middle" fill="#ffd54f" font-size="11" font-style="italic">Más legible que [length-1]</text>

  <!-- ═══ PANEL 5: Tipos de arrays ═══ -->
  <rect x="460" y="275" width="410" height="135" rx="8" fill="#16213e" stroke="#4fc3f7" stroke-width="1.5"/>
  <text x="665" y="296" text-anchor="middle" fill="#4fc3f7" font-size="13" font-weight="bold">Tipos de Arrays</text>

  <rect x="475" y="308" width="185" height="22" rx="3" fill="#0d1b2a"/>
  <text x="483" y="323" fill="#81c784" font-size="11">["a", "b", "c"]      → strings</text>

  <rect x="475" y="334" width="185" height="22" rx="3" fill="#0d1b2a"/>
  <text x="483" y="349" fill="#81c784" font-size="11">[1, 2, 3]            → números</text>

  <rect x="475" y="360" width="185" height="22" rx="3" fill="#0d1b2a"/>
  <text x="483" y="375" fill="#81c784" font-size="11">[true, false, true]  → booleanos</text>

  <rect x="670" y="308" width="185" height="22" rx="3" fill="#0d1b2a"/>
  <text x="678" y="323" fill="#9e9e9e" font-size="11">[]                   → vacío</text>

  <rect x="670" y="334" width="185" height="22" rx="3" fill="#0d1b2a"/>
  <text x="678" y="349" fill="#ffd54f" font-size="11">const arr = []  ← preferido</text>

  <text x="665" y="402" text-anchor="middle" fill="#9e9e9e" font-size="11" font-style="italic">Con const puedes modificar el contenido, no reasignar</text>

  <!-- Footer -->
  <rect x="30" y="425" width="840" height="75" rx="8" fill="#16213e" stroke="#F0DB4F" stroke-width="1"/>
  <text x="450" y="447" text-anchor="middle" fill="#F0DB4F" font-size="12" font-weight="bold">Regla de indexación base-0</text>
  <text x="450" y="466" text-anchor="middle" fill="#e0e0e0" font-size="12">El primer elemento siempre es índice 0. Un array de 5 elementos tiene índices del 0 al 4.</text>
  <text x="450" y="485" text-anchor="middle" fill="#ffd54f" font-size="12">Con .at(): negativo = contar desde el final.  at(-1) = último  |  at(-2) = penúltimo</text>
</svg>
