<svg viewBox="0 0 900 530" xmlns="http://www.w3.org/2000/svg" font-family="Inter, Roboto, Open Sans, system-ui, sans-serif">
  <!-- Fondo -->
  <rect width="900" height="530" fill="#1a1a2e"/>

  <!-- Título -->
  <text x="450" y="38" text-anchor="middle" fill="#F0DB4F" font-size="20" font-weight="bold">Iteración y Transformación de Arrays</text>
  <text x="450" y="58" text-anchor="middle" fill="#9e9e9e" font-size="13">forEach · map · filter</text>

  <!-- ═══ Array fuente ═══ -->
  <rect x="30" y="75" width="840" height="50" rx="8" fill="#16213e" stroke="#F0DB4F" stroke-width="1.5"/>
  <text x="130" y="96" text-anchor="middle" fill="#F0DB4F" font-size="12" font-weight="bold">Array fuente:</text>
  <text x="250" y="112" text-anchor="middle" fill="#9e9e9e" font-size="13" font-family="monospace">const numbers = [10, 20, 30, 40, 50]</text>

  <!-- Flechas hacia los 3 paneles -->
  <line x1="150" y1="125" x2="150" y2="145" stroke="#9e9e9e" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="450" y1="125" x2="450" y2="145" stroke="#9e9e9e" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="750" y1="125" x2="750" y2="145" stroke="#9e9e9e" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- ═══ PANEL forEach ═══ -->
  <rect x="30" y="140" width="265" height="215" rx="8" fill="#16213e" stroke="#4fc3f7" stroke-width="1.5"/>
  <text x="162" y="162" text-anchor="middle" fill="#4fc3f7" font-size="14" font-weight="bold">forEach()</text>
  <text x="162" y="178" text-anchor="middle" fill="#9e9e9e" font-size="11">Efectos secundarios</text>

  <!-- Código -->
  <rect x="45" y="185" width="235" height="70" rx="4" fill="#0d1b2a"/>
  <text x="53" y="202" fill="#4fc3f7" font-size="11">numbers</text>
  <text x="88" y="202" fill="#e0e0e0" font-size="11">.forEach((n) =&gt; {</text>
  <text x="60" y="218" fill="#e0e0e0" font-size="11">  console.log(</text>
  <text x="60" y="234" fill="#81c784" font-size="11">    `Número: ${"{"}n{"}"}`</text>
  <text x="60" y="250" fill="#e0e0e0" font-size="11">  );</text>
  <text x="53" y="266" fill="#e0e0e0" font-size="11">});</text>

  <!-- Resultado forEach -->
  <rect x="45" y="262" width="235" height="60" rx="4" fill="#0d1b2a"/>
  <text x="53" y="278" fill="#9e9e9e" font-size="11" font-style="italic">Salida en consola:</text>
  <text x="53" y="294" fill="#81c784" font-size="11">Número: 10</text>
  <text x="53" y="308" fill="#81c784" font-size="11">Número: 20  ...</text>

  <text x="162" y="340" text-anchor="middle" fill="#e57373" font-size="11">Devuelve: undefined</text>
  <text x="162" y="355" text-anchor="middle" fill="#ffd54f" font-size="11" font-style="italic">No crea nuevo array</text>

  <!-- ═══ PANEL map ═══ -->
  <rect x="320" y="140" width="260" height="215" rx="8" fill="#16213e" stroke="#81c784" stroke-width="1.5"/>
  <text x="450" y="162" text-anchor="middle" fill="#81c784" font-size="14" font-weight="bold">map()</text>
  <text x="450" y="178" text-anchor="middle" fill="#9e9e9e" font-size="11">Transformar cada elemento</text>

  <!-- Código -->
  <rect x="335" y="185" width="230" height="55" rx="4" fill="#0d1b2a"/>
  <text x="343" y="202" fill="#4fc3f7" font-size="11">const doubled =</text>
  <text x="343" y="218" fill="#e0e0e0" font-size="11">  numbers</text>
  <text x="343" y="234" fill="#e0e0e0" font-size="11">    .map(</text>
  <text x="343" y="234" fill="#e0e0e0" font-size="11">                    (n) =&gt; n * 2);</text>

  <!-- Resultado map -->
  <rect x="335" y="248" width="230" height="80" rx="4" fill="#0d1b2a"/>
  <text x="343" y="266" fill="#9e9e9e" font-size="11" font-style="italic">Nuevo array creado:</text>
  <text x="343" y="284" fill="#81c784" font-size="11">doubled =</text>
  <text x="343" y="300" fill="#81c784" font-size="12" font-weight="bold">[20, 40, 60, 80, 100]</text>
  <text x="343" y="320" fill="#9e9e9e" font-size="11">numbers sin cambios</text>

  <text x="450" y="340" text-anchor="middle" fill="#81c784" font-size="11">Devuelve: nuevo array</text>
  <text x="450" y="355" text-anchor="middle" fill="#ffd54f" font-size="11" font-style="italic">Mismo tamaño que el original</text>

  <!-- ═══ PANEL filter ═══ -->
  <rect x="605" y="140" width="265" height="215" rx="8" fill="#16213e" stroke="#ce93d8" stroke-width="1.5"/>
  <text x="737" y="162" text-anchor="middle" fill="#ce93d8" font-size="14" font-weight="bold">filter()</text>
  <text x="737" y="178" text-anchor="middle" fill="#9e9e9e" font-size="11">Seleccionar elementos</text>

  <!-- Código -->
  <rect x="620" y="185" width="235" height="55" rx="4" fill="#0d1b2a"/>
  <text x="628" y="202" fill="#4fc3f7" font-size="11">const big =</text>
  <text x="628" y="218" fill="#e0e0e0" font-size="11">  numbers</text>
  <text x="628" y="234" fill="#e0e0e0" font-size="11">    .filter((n) =&gt; n &gt; 25);</text>

  <!-- Resultado filter -->
  <rect x="620" y="248" width="235" height="80" rx="4" fill="#0d1b2a"/>
  <text x="628" y="266" fill="#9e9e9e" font-size="11" font-style="italic">Solo los que pasan el test:</text>
  <text x="628" y="284" fill="#ce93d8" font-size="11">big =</text>
  <text x="628" y="300" fill="#ce93d8" font-size="12" font-weight="bold">[30, 40, 50]</text>
  <text x="628" y="320" fill="#9e9e9e" font-size="11">numbers sin cambios</text>

  <text x="737" y="340" text-anchor="middle" fill="#ce93d8" font-size="11">Devuelve: nuevo array</text>
  <text x="737" y="355" text-anchor="middle" fill="#ffd54f" font-size="11" font-style="italic">Puede ser menor o vacío</text>

  <!-- ═══ Tabla comparativa ═══ -->
  <rect x="30" y="370" width="840" height="140" rx="8" fill="#16213e" stroke="#F0DB4F" stroke-width="1"/>
  <text x="450" y="392" text-anchor="middle" fill="#F0DB4F" font-size="12" font-weight="bold">¿Cuándo usar cada método?</text>

  <!-- headers -->
  <text x="110" y="412" text-anchor="middle" fill="#9e9e9e" font-size="11" font-weight="bold">Método</text>
  <text x="260" y="412" text-anchor="middle" fill="#9e9e9e" font-size="11" font-weight="bold">¿Devuelve array?</text>
  <text x="430" y="412" text-anchor="middle" fill="#9e9e9e" font-size="11" font-weight="bold">Callback devuelve</text>
  <text x="620" y="412" text-anchor="middle" fill="#9e9e9e" font-size="11" font-weight="bold">Uso típico</text>

  <text x="110" y="432" text-anchor="middle" fill="#4fc3f7" font-size="11">forEach</text>
  <text x="260" y="432" text-anchor="middle" fill="#e57373" font-size="11">❌ undefined</text>
  <text x="430" y="432" text-anchor="middle" fill="#e0e0e0" font-size="11">Nada (void)</text>
  <text x="620" y="432" text-anchor="middle" fill="#e0e0e0" font-size="11">Imprimir, guardar en DB</text>

  <text x="110" y="452" text-anchor="middle" fill="#81c784" font-size="11">map</text>
  <text x="260" y="452" text-anchor="middle" fill="#81c784" font-size="11">✅ Sí (mismo tamaño)</text>
  <text x="430" y="452" text-anchor="middle" fill="#e0e0e0" font-size="11">Nuevo valor transformado</text>
  <text x="620" y="452" text-anchor="middle" fill="#e0e0e0" font-size="11">Calcular precios, formatear</text>

  <text x="110" y="472" text-anchor="middle" fill="#ce93d8" font-size="11">filter</text>
  <text x="260" y="472" text-anchor="middle" fill="#81c784" font-size="11">✅ Sí (menor o vacío)</text>
  <text x="430" y="472" text-anchor="middle" fill="#e0e0e0" font-size="11">true / false</text>
  <text x="620" y="472" text-anchor="middle" fill="#e0e0e0" font-size="11">Activos, aprobados, en stock</text>

  <!-- Warning map -->
  <rect x="45" y="485" width="810" height="15" rx="3" fill="#0d1b2a"/>
  <text x="450" y="496" text-anchor="middle" fill="#ffd54f" font-size="10">⚠️  En map el callback DEBE retornar un valor. Si no retorna, el nuevo array tendrá undefined en cada posición.</text>
</svg>
