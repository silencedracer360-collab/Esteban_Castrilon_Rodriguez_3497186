<svg width="1000" height="680" viewBox="0 0 1000 680" xmlns="http://www.w3.org/2000/svg" font-family="Inter, Roboto, 'Open Sans', system-ui, sans-serif">

  <!-- Fondo -->
  <rect width="1000" height="680" fill="#1a1a2e"/>

  <!-- Título principal -->
  <rect x="0" y="0" width="1000" height="56" fill="#16213e"/>
  <text x="500" y="22" text-anchor="middle" fill="#F0DB4F" font-size="13" font-weight="700" letter-spacing="2">ETAPA 0 — MAPA DE CONCEPTOS</text>
  <text x="500" y="42" text-anchor="middle" fill="#a0a8c0" font-size="11">Semanas 1 a 9 · JavaScript Fundamentos</text>

  <!-- ───────── COLUMNA 1: DATOS (izquierda) ───────── -->
  <!-- Cabecera columna 1 -->
  <rect x="20" y="72" width="220" height="28" rx="5" fill="#F0DB4F"/>
  <text x="130" y="91" text-anchor="middle" fill="#1a1a2e" font-size="12" font-weight="700">DATOS</text>

  <!-- Week 01 box -->
  <rect x="20" y="110" width="220" height="72" rx="6" fill="#16213e" stroke="#F0DB4F" stroke-width="1.5"/>
  <text x="130" y="128" text-anchor="middle" fill="#F0DB4F" font-size="10" font-weight="700">SEMANA 01 · ¿Qué es programar?</text>
  <text x="36" y="144" fill="#a0a8c0" font-size="10">• console.log()</text>
  <text x="36" y="158" fill="#a0a8c0" font-size="10">• typeof · comentarios</text>
  <text x="36" y="172" fill="#a0a8c0" font-size="10">• string · number · boolean</text>

  <!-- Week 02 box -->
  <rect x="20" y="192" width="220" height="72" rx="6" fill="#16213e" stroke="#F0DB4F" stroke-width="1.5"/>
  <text x="130" y="210" text-anchor="middle" fill="#F0DB4F" font-size="10" font-weight="700">SEMANA 02 · Variables y Tipos</text>
  <text x="36" y="226" fill="#4fc3f7" font-size="10">const · let  (nunca var)</text>
  <text x="36" y="240" fill="#a0a8c0" font-size="10">• Number() · String() · Boolean()</text>
  <text x="36" y="254" fill="#a0a8c0" font-size="10">• null · undefined · 1_000_000</text>

  <!-- Week 03 box -->
  <rect x="20" y="274" width="220" height="72" rx="6" fill="#16213e" stroke="#F0DB4F" stroke-width="1.5"/>
  <text x="130" y="292" text-anchor="middle" fill="#F0DB4F" font-size="10" font-weight="700">SEMANA 03 · Operadores</text>
  <text x="36" y="308" fill="#a0a8c0" font-size="10">• + - * / % ** (aritméticos)</text>
  <text x="36" y="322" fill="#4fc3f7" font-size="10">=== !== &gt; &lt; &gt;= &lt;=  (siempre ===)</text>
  <text x="36" y="336" fill="#a0a8c0" font-size="10">• &amp;&amp; || !  (lógicos)</text>

  <!-- Week 04 box -->
  <rect x="20" y="356" width="220" height="88" rx="6" fill="#16213e" stroke="#F0DB4F" stroke-width="1.5"/>
  <text x="130" y="374" text-anchor="middle" fill="#F0DB4F" font-size="10" font-weight="700">SEMANA 04 · Strings</text>
  <text x="36" y="390" fill="#81c784" font-size="10">• template literals  `Hola ${name}`</text>
  <text x="36" y="404" fill="#a0a8c0" font-size="10">• .trim() .includes() .slice()</text>
  <text x="36" y="418" fill="#a0a8c0" font-size="10">• .split() .replace() .padEnd()</text>
  <text x="36" y="432" fill="#a0a8c0" font-size="10">• .toUpperCase() .toLowerCase()</text>

  <!-- ───────── COLUMNA 2: LÓGICA ───────── -->
  <rect x="260" y="72" width="220" height="28" rx="5" fill="#4fc3f7"/>
  <text x="370" y="91" text-anchor="middle" fill="#1a1a2e" font-size="12" font-weight="700">LÓGICA</text>

  <!-- Week 05 box -->
  <rect x="260" y="110" width="220" height="104" rx="6" fill="#16213e" stroke="#4fc3f7" stroke-width="1.5"/>
  <text x="370" y="128" text-anchor="middle" fill="#4fc3f7" font-size="10" font-weight="700">SEMANA 05 · Condicionales</text>
  <text x="276" y="144" fill="#a0a8c0" font-size="10">• if / else if / else</text>
  <text x="276" y="158" fill="#81c784" font-size="10">• ternario  cond ? valor : otro</text>
  <text x="276" y="172" fill="#a0a8c0" font-size="10">• switch</text>
  <text x="276" y="186" fill="#ce93d8" font-size="10">• ??  nullish coalescing (ES2020)</text>
  <text x="276" y="200" fill="#ce93d8" font-size="10">• ?.  optional chaining (ES2020)</text>

  <!-- Week 06 box -->
  <rect x="260" y="224" width="220" height="104" rx="6" fill="#16213e" stroke="#4fc3f7" stroke-width="1.5"/>
  <text x="370" y="242" text-anchor="middle" fill="#4fc3f7" font-size="10" font-weight="700">SEMANA 06 · Bucles</text>
  <text x="276" y="258" fill="#a0a8c0" font-size="10">• for (let i = 0; i &lt; n; i++)</text>
  <text x="276" y="272" fill="#a0a8c0" font-size="10">• while / do...while</text>
  <text x="276" y="286" fill="#81c784" font-size="10">• for...of  ← moderno preferido</text>
  <text x="276" y="300" fill="#a0a8c0" font-size="10">• forEach()  (con arrow function)</text>
  <text x="276" y="314" fill="#a0a8c0" font-size="10">• break / continue</text>

  <!-- Conector lógica 05-06 -->
  <line x1="370" y1="214" x2="370" y2="224" stroke="#4fc3f7" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- ───────── COLUMNA 3: FUNCIONES ───────── -->
  <rect x="500" y="72" width="220" height="28" rx="5" fill="#81c784"/>
  <text x="610" y="91" text-anchor="middle" fill="#1a1a2e" font-size="12" font-weight="700">FUNCIONES</text>

  <!-- Week 07 box -->
  <rect x="500" y="110" width="220" height="136" rx="6" fill="#16213e" stroke="#81c784" stroke-width="1.5"/>
  <text x="610" y="128" text-anchor="middle" fill="#81c784" font-size="10" font-weight="700">SEMANA 07 · Funciones</text>
  <text x="516" y="144" fill="#a0a8c0" font-size="10">• function nombre() { ... }</text>
  <text x="516" y="158" fill="#81c784" font-size="10">• const fn = (x) =&gt; x * 2</text>
  <text x="516" y="172" fill="#81c784" font-size="10">• const fn = (x) =&gt; ({ key: x })  ← obj</text>
  <text x="516" y="186" fill="#a0a8c0" font-size="10">• parámetros por defecto</text>
  <text x="516" y="200" fill="#a0a8c0" font-size="10">• return explícito vs implícito</text>
  <text x="516" y="214" fill="#a0a8c0" font-size="10">• scope local vs global</text>
  <text x="516" y="228" fill="#a0a8c0" font-size="10">• funciones puras (sin efectos)</text>

  <!-- ───────── COLUMNA 4: ESTRUCTURAS ───────── -->
  <rect x="740" y="72" width="240" height="28" rx="5" fill="#ce93d8"/>
  <text x="860" y="91" text-anchor="middle" fill="#1a1a2e" font-size="12" font-weight="700">ESTRUCTURAS DE DATOS</text>

  <!-- Week 08 box -->
  <rect x="740" y="110" width="240" height="120" rx="6" fill="#16213e" stroke="#ce93d8" stroke-width="1.5"/>
  <text x="860" y="128" text-anchor="middle" fill="#ce93d8" font-size="10" font-weight="700">SEMANA 08 · Arrays</text>
  <text x="756" y="144" fill="#a0a8c0" font-size="10">const arr = [1, 2, 3]</text>
  <text x="756" y="158" fill="#a0a8c0" font-size="10">• .push() .pop() .at(-1) (ES2022)</text>
  <text x="756" y="172" fill="#81c784" font-size="10">• .filter() .map() .find()</text>
  <text x="756" y="186" fill="#81c784" font-size="10">• [...arr].sort(comparador)</text>
  <text x="756" y="200" fill="#a0a8c0" font-size="10">• .includes() .indexOf() .slice()</text>
  <text x="756" y="214" fill="#ce93d8" font-size="10">• spread: [...arr1, ...arr2]</text>

  <!-- Week 09 box -->
  <rect x="740" y="240" width="240" height="152" rx="6" fill="#16213e" stroke="#ce93d8" stroke-width="1.5"/>
  <text x="860" y="258" text-anchor="middle" fill="#ce93d8" font-size="10" font-weight="700">SEMANA 09 · Objetos</text>
  <text x="756" y="274" fill="#a0a8c0" font-size="10">const obj = { key: value }</text>
  <text x="756" y="288" fill="#a0a8c0" font-size="10">• obj.key  /  obj["key"]</text>
  <text x="756" y="302" fill="#81c784" font-size="10">• Object.keys() .values() .entries()</text>
  <text x="756" y="316" fill="#F0DB4F" font-size="10">• Object.hasOwn()  (ES2022)</text>
  <text x="756" y="330" fill="#a0a8c0" font-size="10">• for...in + hasOwn</text>
  <text x="756" y="344" fill="#81c784" font-size="10">• spread: { ...obj, key: val }</text>
  <text x="756" y="358" fill="#ce93d8" font-size="10">• arrays de objetos .filter .map</text>
  <text x="756" y="372" fill="#a0a8c0" font-size="10">• actualización inmutable</text>

  <!-- Conector arrays-objetos -->
  <line x1="860" y1="230" x2="860" y2="240" stroke="#ce93d8" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- ───────── FILA INFERIOR: PROYECTO INTEGRADOR ───────── -->
  <rect x="20" y="480" width="960" height="68" rx="8" fill="#16213e" stroke="#F0DB4F" stroke-width="2"/>
  <text x="500" y="504" text-anchor="middle" fill="#F0DB4F" font-size="13" font-weight="700">🏆 SEMANA 10 · PROYECTO INTEGRADOR — ETAPA 0</text>
  <text x="160" y="525" text-anchor="middle" fill="#a0a8c0" font-size="10">Variables + Tipos</text>
  <text x="300" y="525" text-anchor="middle" fill="#a0a8c0" font-size="10">Strings + Operadores</text>
  <text x="440" y="525" text-anchor="middle" fill="#a0a8c0" font-size="10">Condicionales + Bucles</text>
  <text x="580" y="525" text-anchor="middle" fill="#a0a8c0" font-size="10">Funciones Arrow</text>
  <text x="720" y="525" text-anchor="middle" fill="#a0a8c0" font-size="10">Arrays con métodos</text>
  <text x="860" y="525" text-anchor="middle" fill="#a0a8c0" font-size="10">Objetos + Object.*</text>
  <!-- Flechas hacia proyecto -->
  <line x1="130" y1="460" x2="160" y2="480" stroke="#a0a8c0" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="370" y1="460" x2="370" y2="480" stroke="#a0a8c0" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="610" y1="460" x2="580" y2="480" stroke="#a0a8c0" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="860" y1="462" x2="860" y2="480" stroke="#a0a8c0" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Footer -->
  <text x="500" y="662" text-anchor="middle" fill="#4a5568" font-size="10">Bootcamp JavaScript ES2023 · Etapa 0 · Semanas 1–10</text>

</svg>
